# Production profile: run with --spring.profiles.active=prod (or env SPRING_PROFILES_ACTIVE=prod)
# Set secrets and DB via environment or an EnvironmentFile (never commit real passwords).

# --- Database (override on the server) ---
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- CORS: comma-separated origins (no spaces); set CORS_ALLOWED_ORIGINS on the server ---
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# --- JWT: set env JWT_SECRET on the server (see application.properties); do not copy weak defaults to prod. ---

# --- Bootstrap first admin only when intentional (usually off after first deploy) ---
# app.bootstrap-admin.enabled=true
# app.bootstrap-admin.email=you@yourdomain.com
# app.bootstrap-admin.password=REPLACE_WITH_STRONG_PASSWORD

# --- JPA: use validate or none once schema is stable; update is convenient for first deploy ---
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
logging.level.com.photoshop=INFO
logging.level.org.springframework.web=INFO
