version: '3.8'

services:
  # ---- MySQL Database ----
  mysql:
    image: mysql:8.0
    container_name: photoshop-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: photoshop_db
      MYSQL_USER: photoshop
      MYSQL_PASSWORD: photoshop123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---- Spring Boot Backend ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: photoshop-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/photoshop_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: photoshop
      SPRING_DATASOURCE_PASSWORD: photoshop123
      JWT_SECRET: photoshop-production-jwt-secret-key-change-this-2024
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-your_cloud_name}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-your_api_key}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-your_api_secret}
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - photoshop-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ---- phpMyAdmin (optional DB GUI) ----
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: photoshop-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: photoshop
      PMA_PASSWORD: photoshop123
    depends_on:
      - mysql
    networks:
      - photoshop-network

volumes:
  mysql_data:

networks:
  photoshop-network:
    driver: bridge
